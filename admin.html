<!DOCTYPE html>
<html>
<head>
<title>Draxeliora Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
max-width:500px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
box-sizing:border-box;
}

button{
padding:12px;
background:#ff9900;
color:white;
border:none;
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Admin Panel</h2>

<input id="title" placeholder="Product Title">

<input id="image" placeholder="Image URL">

<input id="link" placeholder="Affiliate Link">

<textarea id="desc" placeholder="Description"></textarea>

<button id="addBtn">Add Product</button>
<hr>

<h3>Products</h3>

<div id="productList"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";





const firebaseConfig = {
apiKey: "AIzaSyAAoCLEj3PCotN_pcsbOXdVteLi4xN0hW8",
authDomain: "draxeliora-store.firebaseapp.com",
projectId: "draxeliora-store",
storageBucket: "draxeliora-store.firebasestorage.app",
messagingSenderId: "119154228798",
appId: "1:119154228798:web:1c45579a613461b9735b6f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
async function loadProducts(){

const snapshot = await getDocs(collection(db,"products"));

const list = document.getElementById("productList");

list.innerHTML = "";

snapshot.forEach((productDoc)=>{

const p = productDoc.data();

list.innerHTML += `
<div style="border:1px solid #ddd;padding:10px;margin:10px 0;">
<img src="${p.image}" width="100"><br><br>

<b>${p.title}</b><br>

${p.description}<br><br>

<a href="${p.link}" target="_blank">Open Product</a>

<br><br>

<button onclick="deleteProduct('${productDoc.id}')">
Delete Product
</button>

</div>
`;

});

}

window.deleteProduct = async function(id){

if(!confirm("Delete this product?")) return;

await deleteDoc(doc(db,"products",id));

loadProducts();

};

loadProducts();
document.getElementById("addBtn").addEventListener("click", async () => {

try {

await addDoc(collection(db,"products"),{

title: document.getElementById("title").value,

image: document.getElementById("image").value,

link: document.getElementById("link").value,

description: document.getElementById("desc").value

});

alert("Product Added!");
document.getElementById("title").value = "";
document.getElementById("image").value = "";
document.getElementById("link").value = "";
document.getElementById("desc").value = "";
 loadProducts();
} catch(error){

alert("ERROR: " + error.message);

}

});

</script>

</body>
</html>
