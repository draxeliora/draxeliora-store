<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draxeliora Store</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
text-align:center;
}
h1{
color:#222;
}
.card{
background:#fff;
padding:20px;
border-radius:12px;
max-width:350px;
margin:20px auto;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}
img{
width:100%;
border-radius:10px;
}
button{
background:#ff9900;
color:#fff;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>🛍️ Draxeliora Store</h1>

<div class="card">
<img src="https://via.placeholder.com/300x300.png?text=Your+Product" alt="Product">
<h2>Product Name</h2>
<p>Best Amazon Deal</p>

<a href="https://amazon.com" target="_blank">
<button>Buy on Amazon</button>
</a>
</div>

</body>
</html>
